name: Deploy to Render

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: EduConnect

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: EduConnect/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

  backend-build:
    name: Build backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend
        run: |
          chmod +x mvnw
          ./mvnw -DskipTests package

  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-build

    env:
      RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}

    steps:
      - name: Validate Render deploy hooks
        run: |
          missing=0

          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing secret RENDER_BACKEND_DEPLOY_HOOK_URL"
            missing=1
          fi

          if [ -z "$RENDER_FRONTEND_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing secret RENDER_FRONTEND_DEPLOY_HOOK_URL"
            missing=1
          fi

          exit "$missing"

      - name: Deploy backend on Render
        run: curl --fail --show-error --silent --request POST "$RENDER_BACKEND_DEPLOY_HOOK_URL"

      - name: Deploy frontend on Render
        run: curl --fail --show-error --silent --request POST "$RENDER_FRONTEND_DEPLOY_HOOK_URL"
