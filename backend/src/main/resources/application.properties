# Application
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
spring.application.name=EduConnect
server.port=${PORT:${SERVER_PORT:8080}}

# Database H2 (Development) - Comentado para usar PostgreSQL
#spring.datasource.url=jdbc:h2:mem:educonnect
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT}

# JWT Configuration (Base64 encoded secret key - 256 bits)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Upload Directory
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# Google Calendar
google.calendar.enabled=${GOOGLE_CALENDAR_ENABLED:false}
google.calendar.client-id=${GOOGLE_CLIENT_ID:}
google.calendar.client-secret=${GOOGLE_CLIENT_SECRET:}
google.calendar.redirect-uri=${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:8080/api/google-calendar/callback}
google.calendar.frontend-redirect-url=${GOOGLE_CALENDAR_FRONTEND_REDIRECT_URL:http://localhost:3000/calendario}
google.calendar.scope=${GOOGLE_CALENDAR_SCOPE:https://www.googleapis.com/auth/calendar}
google.calendar.default-calendar-id=${GOOGLE_CALENDAR_DEFAULT_CALENDAR_ID:primary}
google.calendar.time-zone=${GOOGLE_CALENDAR_TIMEZONE:America/Sao_Paulo}
google.calendar.default-duration-minutes=${GOOGLE_CALENDAR_DEFAULT_DURATION_MINUTES:60}

# Logging
logging.level.com.educonnect=DEBUG
logging.level.org.springframework.security=DEBUG
